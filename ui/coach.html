<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Still Want To Watch? — Life Coach</title>
    <link rel="stylesheet" href="./analytics.css" />
    <style>
      body { width: auto; }
      .wrap { max-width: 720px; margin: 0 auto; }

      .coach-messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 8px 0 20px;
      }

      .coach-msg {
        max-width: 80%;
        padding: 11px 14px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .coach-msg.coach {
        background: rgba(110, 168, 254, 0.12);
        border: 1px solid rgba(110, 168, 254, 0.25);
        align-self: flex-start;
        color: var(--text);
      }

      .coach-msg.user {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--border);
        align-self: flex-end;
        color: var(--muted);
      }

      .coach-thinking {
        font-size: 20px;
        letter-spacing: 3px;
        color: var(--muted);
        align-self: flex-start;
        padding: 4px 8px;
        animation: blink 1.2s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      .input-row {
        display: flex;
        gap: 8px;
        align-items: center;
        position: sticky;
        bottom: 0;
        background: var(--bg);
        padding: 12px 0 4px;
        border-top: 1px solid var(--border);
      }

      .input-row input {
        flex: 1;
        appearance: none;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: var(--font);
        outline: none;
        box-sizing: border-box;
      }

      .input-row input:focus {
        border-color: rgba(110, 168, 254, 0.9);
        box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.18);
      }

      .context-bar {
        font-size: 12px;
        color: var(--muted);
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        margin-bottom: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="wrap" aria-label="Life coach chat">
      <header class="top">
        <div class="title">Still Want To Watch?</div>
        <div class="muted" id="status"></div>
      </header>

      <nav class="tabs" aria-label="Page tabs">
        <a class="tab" href="./app.html">Session</a>
        <a class="tab" href="./charts.html">Analytics</a>
        <a class="tab" href="./notes.html">Notes</a>
        <a class="tab" href="./settings.html">Settings</a>
      </nav>

      <section class="card">
        <div class="sectionTitle" style="margin-bottom:12px">Life Coach</div>
        <div class="context-bar" id="contextBar" style="display:none"></div>
        <div class="coach-messages" id="messages" aria-live="polite"></div>
        <div class="input-row">
          <input id="chatInput" type="text" placeholder="Reply to the coach…" autocomplete="off" />
          <button class="btn primary" id="sendBtn" disabled>Send</button>
        </div>
      </section>
    </main>
    <script src="./coach.js"></script>
  </body>
</html>
